name: CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Login GHCR
      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 3. Build image
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/dhia1911/flask-devops-project:latest .
          docker build -t ghcr.io/dhia1911/flask-devops-project:sha-${{ github.sha }} .

      # 4. Push image
      - name: Push Docker image
        run: |
          docker push ghcr.io/dhia1911/flask-devops-project:latest
          docker push ghcr.io/dhia1911/flask-devops-project:sha-${{ github.sha }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/dhia1911/flask-devops-project:latest
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL

      - name: Trivy SARIF report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/dhia1911/flask-devops-project:latest
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif